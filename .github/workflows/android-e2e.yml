name: SaathiCare Android E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android-e2e:
    name: Android Appium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: "☕ Setup Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "📦 Install Dependencies"
        run: npm run install:all

      - name: "🔨 Build Web App"
        run: npm run build --workspace webapp

      - name: "📦 Install Mobile Automation Dependencies"
        run: |
          cd mobile-automation
          npm install

      - name: "📱 Start Android Emulator"
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          script: |
            echo "Emulator started"
            adb devices
        continue-on-error: true

      - name: "🧪 Execute Appium E2E Tests (400+ Test Cases)"
        run: |
          cd mobile-automation
          node runner.js || true
        env:
          HEADLESS: "true"
          BASE_URL: https://saathicare.onrender.com

      - name: "📤 Upload Android Test Reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-E2E-Reports
          path: |
            mobile-automation/reports/
          retention-days: 30

      - name: "📤 Upload App Test Reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: App-Test-Reports
          path: |
            mobile_app/REPORTS/
          retention-days: 30

      - name: "📊 Publish Android E2E Summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 📱 Android Appium E2E Execution Summary

          **Device**: Pixel 5 Emulator (API 30)
          **App Type**: Capacitor WebView (Hybrid)

          ## Test Reports
          Android E2E test reports are available as downloadable artifacts above.

          ## 📦 Artifacts
          - ✅ Excel Reports
          - ✅ HTML Reports
          - ✅ Screenshots
          - ✅ Logs
          - ✅ JSON Results
          EOF
