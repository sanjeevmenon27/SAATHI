name: SaathiCare Test Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Test Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Publish Test Results to Job Summary
        run: |
          python scripts/publish_results.py

      - name: Upload Frontend Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Frontend-Test-Report
          path: "REPORTS/frontend/frontend saathi care result.xlsx"

      - name: Upload Backend Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Backend-Test-Report
          path: "REPORTS/backend/backend saati care result.xlsx"
